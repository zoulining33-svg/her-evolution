<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>她进化 · 小雅</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #f5f5f5;
            --sidebar-bg: #ffffff;
            --chat-bg: #f5f5f5;
            --primary: #d4455f;
            --primary-light: #fdf2f4;
            --text: #1a1a1a;
            --text-secondary: #666666;
            --border: #e5e5e5;
            --bubble-user: #d4455f;
            --bubble-ai: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: var(--bg);
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            height: 100vh;
        }

        /* 侧边栏 */
        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
        }

        .new-chat-btn {
            width: 100%;
            padding: 12px 16px;
            background: var(--primary-light);
            border: 1px solid var(--primary);
            border-radius: 8px;
            color: var(--primary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .new-chat-btn:hover {
            background: var(--primary);
            color: white;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .chat-item {
            padding: 12px 16px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 4px;
            transition: all 0.2s;
        }

        .chat-item:hover {
            background: var(--bg);
        }

        .chat-item.active {
            background: var(--primary-light);
        }

        .chat-item-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), #b8283e);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .chat-item-info {
            flex: 1;
            overflow: hidden;
        }

        .chat-item-title {
            font-size: 14px;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-item-preview {
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 2px;
        }

        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid var(--border);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
        }

        .user-info:hover {
            background: var(--bg);
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), #b8283e);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
        }

        .user-name {
            font-size: 14px;
            color: var(--text);
            font-weight: 500;
        }

        /* 主聊天区 */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--chat-bg);
        }

        .chat-header {
            padding: 16px 24px;
            background: white;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
        }

        .chat-actions {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            width: 36px;
            height: 36px;
            border: none;
            background: transparent;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: var(--bg);
        }

        /* 消息区域 */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .message {
            display: flex;
            gap: 16px;
            max-width: 85%;
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .message.assistant .message-avatar {
            background: linear-gradient(135deg, var(--primary), #b8283e);
        }

        .message.user .message-avatar {
            background: #6b7280;
        }

        .message-content {
            padding: 16px 20px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-word;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .message.assistant .message-content {
            background: var(--bubble-ai);
            color: var(--text);
            border-bottom-left-radius: 4px;
        }

        .message.user .message-content {
            background: var(--bubble-user);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message-image {
            max-width: 300px;
            max-height: 300px;
            border-radius: 12px;
            margin-top: 8px;
        }

        /* 输入区域 */
        .input-area {
            padding: 16px 24px 24px;
            background: white;
            border-top: 1px solid var(--border);
        }

        .input-box {
            background: var(--bg);
            border-radius: 16px;
            padding: 12px 16px;
        }

        .input-toolbar {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        .toolbar-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.2s;
        }

        .toolbar-btn:hover {
            background: white;
        }

        .input-wrap {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-field {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            font-size: 15px;
            line-height: 1.6;
            color: var(--text);
            resize: none;
            min-height: 24px;
            max-height: 120px;
            font-family: inherit;
        }

        .input-field::placeholder {
            color: var(--text-secondary);
        }

        .send-btn {
            width: 36px;
            height: 36px;
            border: none;
            background: var(--primary);
            border-radius: 10px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover {
            background: #b8283e;
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 欢迎页 */
        .welcome {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
        }

        .welcome-logo {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            background: linear-gradient(135deg, var(--primary), #b8283e);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin-bottom: 24px;
            box-shadow: 0 8px 32px rgba(212, 69, 95, 0.3);
        }

        .welcome h1 {
            font-size: 28px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 8px;
        }

        .welcome p {
            font-size: 15px;
            color: var(--text-secondary);
            margin-bottom: 32px;
        }

        .quick-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 600px;
        }

        .quick-action {
            padding: 12px 20px;
            background: white;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 14px;
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-action:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* 加载动画 */
        .typing {
            display: flex;
            gap: 4px;
            padding: 8px 0;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }
            
            .messages {
                padding: 16px;
            }
            
            .message {
                max-width: 90%;
            }
        }

        /* 隐藏的文件输入 */
        #fileInput {
            display: none;
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" onclick="newChat()">
                    <span>+</span>
                    <span>新建对话</span>
                </button>
            </div>
            
            <div class="chat-list" id="chatList">
                <!-- 对话列表 -->
            </div>
            
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar">我</div>
                    <div class="user-name">我的账号</div>
                </div>
            </div>
        </aside>

        <!-- 主聊天区 -->
        <main class="main">
            <header class="chat-header">
                <div class="chat-title" id="chatTitle">新的对话</div>
                <div class="chat-actions">
                    <button class="action-btn" onclick="exportChat()" title="导出">📥</button>
                    <button class="action-btn" onclick="clearCurrentChat()" title="清空">🗑️</button>
                </div>
            </header>

            <div class="messages" id="messages">
                <div class="welcome" id="welcome">
                    <div class="welcome-logo">🌸</div>
                    <h1>她进化 · 小雅</h1>
                    <p>你的 AI 情感成长伙伴</p>
                    <div class="quick-actions">
                        <div class="quick-action" onclick="quickStart('最近和老公吵架了，不知道怎么办')">💔 感情困扰</div>
                        <div class="quick-action" onclick="quickStart('工作好迷茫，想换行')">💼 职场困惑</div>
                        <div class="quick-action" onclick="quickStart('如何让自己更有魅力')">✨ 自我提升</div>
                        <div class="quick-action" onclick="quickStart('怎么激发老公的保护欲')">💕 关系经营</div>
                    </div>
                </div>
            </div>

            <div class="input-area">
                <div class="input-box">
                    <div class="input-toolbar">
                        <button class="toolbar-btn" onclick="document.getElementById('fileInput').click()" title="上传图片">📷</button>
                        <button class="toolbar-btn" onclick="document.getElementById('fileInput').click()" title="上传文档">📎</button>
                    </div>
                    <div class="input-wrap">
                        <textarea class="input-field" id="inputField" placeholder="输入消息..." rows="1" onkeydown="handleKeyDown(event)" oninput="autoResize(this)"></textarea>
                        <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <input type="file" id="fileInput" accept="image/*,.pdf,.doc,.docx,.txt" onchange="handleFile(event)">

    <script>
        // API 配置
        const API_KEY = 'sk-nVBzqDnFOfeFvw97o1C8kUmm7IweiHKbNUUc7Z1jZqBxtRyM';
        const API_URL = 'https://api.hunyuan.cloud.tencent.com/v1/chat/completions';
        const MODEL = 'hunyuan-lite';

        // 数据存储
        let currentChatId = null;
        let chats = JSON.parse(localStorage.getItem('xiaoya_chats') || '[]');
        let isLoading = false;

        const XIAOYA_PROMPT = `你是小雅，"她进化"平台的 AI 情感成长伙伴。

定位：希望女性越来越好的情感专家
目标：帮女生走入长择，让老公依赖她、回归家庭，激发男生保护欲

核心观点：
- 大吵大闹、情绪不稳定、强势的女生，不可能让男生有保护欲
- 男生天生喜欢保护弱小
- 如果女生什么都自己干了，男生为什么要做？
- 但让男生做，要有方法

回答风格：
- 分析问题透彻，一针见血
- 指出女生的问题，但不是骂她
- 教她怎么调整自己，怎么激发男人的保护欲
- 不要给情绪价值（不要说"你好委屈"）
- 不要跟着骂男人

注意：
- 不要加任何动作描写、只说话不要表演
- 用户问具体问题时，先给分析和信息，不要一直反问引导
- 回答要完整，不要截断`;

        // 初始化
        window.onload = () => {
            renderChatList();
            if (chats.length === 0) {
                newChat();
            } else {
                loadChat(chats[0].id);
            }
        };

        // 新建对话
        function newChat() {
            const chat = {
                id: Date.now().toString(),
                title: '新的对话',
                messages: [],
                createdAt: new Date().toISOString()
            };
            chats.unshift(chat);
            saveChats();
            renderChatList();
            loadChat(chat.id);
        }

        // 加载对话
        function loadChat(chatId) {
            currentChatId = chatId;
            const chat = chats.find(c => c.id === chatId);
            if (!chat) return;

            document.getElementById('chatTitle').textContent = chat.title;
            
            const messagesDiv = document.getElementById('messages');
            messagesDiv.innerHTML = '';

            if (chat.messages.length === 0) {
                messagesDiv.innerHTML = `
                    <div class="welcome">
                        <div class="welcome-logo">🌸</div>
                        <h1>她进化 · 小雅</h1>
                        <p>你的 AI 情感成长伙伴</p>
                        <div class="quick-actions">
                            <div class="quick-action" onclick="quickStart('最近和老公吵架了，不知道怎么办')">💔 感情困扰</div>
                            <div class="quick-action" onclick="quickStart('工作好迷茫，想换行')">💼 职场困惑</div>
                            <div class="quick-action" onclick="quickStart('如何让自己更有魅力')">✨ 自我提升</div>
                            <div class="quick-action" onclick="quickStart('怎么激发老公的保护欲')">💕 关系经营</div>
                        </div>
                    </div>
                `;
            } else {
                chat.messages.forEach(msg => {
                    if (msg.role !== 'system') {
                        addMessageToUI(msg.content, msg.role, false);
                    }
                });
            }

            renderChatList();
            scrollToBottom();
        }

        // 渲染对话列表
        function renderChatList() {
            const listDiv = document.getElementById('chatList');
            listDiv.innerHTML = chats.map(chat => `
                <div class="chat-item ${chat.id === currentChatId ? 'active' : ''}" onclick="loadChat('${chat.id}')">
                    <div class="chat-item-icon">🌸</div>
                    <div class="chat-item-info">
                        <div class="chat-item-title">${escapeHtml(chat.title)}</div>
                        <div class="chat-item-preview">${chat.messages.length > 0 ? escapeHtml(chat.messages[chat.messages.length - 1].content.substring(0, 20)) : '开始新的对话...'}</div>
                    </div>
                </div>
            `).join('');
        }

        // 快速开始
        function quickStart(text) {
            document.getElementById('inputField').value = text;
            sendMessage();
        }

        // 发送消息
        async function sendMessage() {
            const input = document.getElementById('inputField');
            const message = input.value.trim();
            if (!message || isLoading) return;

            input.value = '';
            input.style.height = 'auto';

            // 检查是否是新对话的第一条消息
            const chat = chats.find(c => c.id === currentChatId);
            if (chat && chat.messages.length === 0) {
                chat.title = message.substring(0, 20);
                saveChats();
                renderChatList();
                document.getElementById('chatTitle').textContent = chat.title;
            }

            addMessageToUI(message, 'user', true);
            showTyping();

            isLoading = true;
            document.getElementById('sendBtn').disabled = true;

            try {
                const reply = await callAI(message);
                hideTyping();
                addMessageToUI(reply, 'assistant', true);
            } catch (e) {
                hideTyping();
                addMessageToUI('出错了: ' + e.message, 'assistant', true);
            }

            isLoading = false;
            document.getElementById('sendBtn').disabled = false;
            scrollToBottom();
        }

        // 调用 AI
        async function callAI(userMessage) {
            const chat = chats.find(c => c.id === currentChatId);
            const history = chat ? chat.messages.slice(-20) : [];

            const allMessages = [
                { role: 'system', content: XIAOYA_PROMPT },
                ...history.map(m => ({ role: m.role, content: m.content })),
                { role: 'user', content: userMessage }
            ];

            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
                body: JSON.stringify({ model: MODEL, messages: allMessages, max_tokens: 4096, temperature: 0.8 })
            });

            if (!response.ok) throw new Error('API 错误: ' + response.status);

            const data = await response.json();
            if (!data.choices || !data.choices[0]) throw new Error('返回格式异常');
            
            return data.choices[0].message.content;
        }

        // 添加消息到 UI
        function addMessageToUI(content, role, save = true) {
            const messagesDiv = document.getElementById('messages');
            const welcome = messagesDiv.querySelector('.welcome');
            if (welcome) welcome.remove();

            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            msgDiv.innerHTML = `
                <div class="message-avatar">${role === 'user' ? '👤' : '🌸'}</div>
                <div class="message-content">${escapeHtml(content)}</div>
            `;
            messagesDiv.appendChild(msgDiv);

            if (save) {
                const chat = chats.find(c => c.id === currentChatId);
                if (chat) {
                    chat.messages.push({ role, content, time: new Date().toISOString() });
                    saveChats();
                    renderChatList();
                }
            }

            scrollToBottom();
        }

        // 显示加载
        function showTyping() {
            const messagesDiv = document.getElementById('messages');
            const typingDiv = document.createElement('div');
            typingDiv.id = 'typingIndicator';
            typingDiv.className = 'message assistant';
            typingDiv.innerHTML = `
                <div class="message-avatar">🌸</div>
                <div class="message-content">
                    <div class="typing">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>
            `;
            messagesDiv.appendChild(typingDiv);
            scrollToBottom();
        }

        function hideTyping() {
            document.getElementById('typingIndicator')?.remove();
        }

        // 处理文件上传
        function handleFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    addImageMessage(e.target.result);
                };
                reader.readAsDataURL(file);
            } else {
                alert('文档功能开发中，目前仅支持图片');
            }
        }

        function addImageMessage(imageData) {
            const messagesDiv = document.getElementById('messages');
            const welcome = messagesDiv.querySelector('.welcome');
            if (welcome) welcome.remove();

            const msgDiv = document.createElement('div');
            msgDiv.className = 'message user';
            msgDiv.innerHTML = `
                <div class="message-avatar">👤</div>
                <div class="message-content">
                    <img src="${imageData}" class="message-image">
                </div>
            `;
            messagesDiv.appendChild(msgDiv);
            scrollToBottom();

            // TODO: 调用图像识别 API
            setTimeout(() => {
                addMessageToUI('我看到你上传了图片，但我目前还不能识别图片内容。请用文字描述一下你想聊什么～', 'assistant', true);
            }, 1000);
        }

        // 导出对话
        function exportChat() {
            const chat = chats.find(c => c.id === currentChatId);
            if (!chat || chat.messages.length === 0) {
                alert('没有可导出的内容');
                return;
            }

            let md = `# 她进化 - 小雅聊天记录\n\n`;
            md += `对话：${chat.title}\n`;
            md += `导出时间：${new Date().toLocaleString()}\n\n---\n\n`;
            chat.messages.forEach(m => {
                md += `### ${m.role === 'user' ? '👤 用户' : '🌸 小雅'}\n\n${m.content}\n\n---\n\n`;
            });

            const blob = new Blob([md], { type: 'text/markdown' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `xiaoya-${chat.title}-${Date.now()}.md`;
            a.click();
        }

        // 清空当前对话
        function clearCurrentChat() {
            if (!confirm('确定要清空当前对话吗？')) return;
            const chat = chats.find(c => c.id === currentChatId);
            if (chat) {
                chat.messages = [];
                chat.title = '新的对话';
                saveChats();
                loadChat(currentChatId);
            }
        }

        // 保存数据
        function saveChats() {
            localStorage.setItem('xiaoya_chats', JSON.stringify(chats.slice(0, 50)));
        }

        // 工具函数
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML.replace(/\n/g, '<br>');
        }

        function scrollToBottom() {
            const messagesDiv = document.getElementById('messages');
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 120) + 'px';
        }
    </script>
</body>
</html>
