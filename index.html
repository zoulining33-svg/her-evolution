<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>她进化 · 小雅</title>
    <style>
        :root {
            --rose-100: #fdf2f4;
            --rose-200: #fbd6db;
            --rose-300: #f4a9b4;
            --rose-400: #e87085;
            --rose-500: #d4455f;
            --rose-600: #b8283e;
            --cream: #faf7f2;
            --cream-dark: #f0ebe0;
            --ink: #1a1410;
            --ink-soft: #4a3f35;
            --ink-light: #9a8e83;
            --shadow: rgba(212, 69, 95, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Noto Sans SC', sans-serif;
            background: var(--cream);
            color: var(--ink);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ============ 顶部导航 ============ */
        .header {
            background: rgba(250, 247, 242, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(212, 69, 95, 0.08);
            flex-shrink: 0;
            z-index: 10;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--rose-400), var(--rose-500));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            box-shadow: 0 4px 16px rgba(212, 69, 95, 0.25);
        }

        .header-info h1 {
            font-size: 17px;
            font-weight: 600;
            color: var(--ink);
            letter-spacing: 1px;
        }

        .header-info p {
            font-size: 12px;
            color: var(--ink-light);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #34c759;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .header-right {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: var(--rose-100);
            color: var(--rose-500);
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .icon-btn:hover {
            background: var(--rose-200);
            transform: scale(1.05);
        }

        .export-btn {
            width: auto;
            padding: 0 14px;
            border-radius: 18px;
            font-size: 12px;
            font-weight: 500;
            gap: 4px;
        }

        .export-btn:hover {
            background: var(--rose-200);
        }

        /* ============ 记忆面板 ============ */
        .memory-panel {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            max-width: 400px;
            height: 100vh;
            background: white;
            box-shadow: -8px 0 40px rgba(0,0,0,0.1);
            z-index: 100;
            transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }

        .memory-panel.open {
            right: 0;
        }

        .memory-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.3);
            opacity: 0;
            visibility: hidden;
            z-index: 99;
            transition: all 0.3s;
        }

        .memory-overlay.open {
            opacity: 1;
            visibility: visible;
        }

        .memory-header {
            padding: 20px;
            border-bottom: 1px solid var(--rose-100);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .memory-header h2 {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .memory-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .memory-section {
            margin-bottom: 24px;
        }

        .memory-section-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--rose-400);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .memory-text {
            font-size: 14px;
            color: var(--ink-soft);
            line-height: 1.8;
            background: var(--rose-100);
            padding: 14px;
            border-radius: 12px;
            white-space: pre-wrap;
        }

        .memory-empty {
            text-align: center;
            padding: 40px;
            color: var(--ink-light);
            font-size: 14px;
        }

        .memory-empty-icon {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        .memory-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--rose-100);
        }

        .reset-btn {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--rose-200);
            border-radius: 12px;
            background: transparent;
            color: var(--ink-light);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .reset-btn:hover {
            border-color: var(--rose-400);
            color: var(--rose-500);
        }

        /* ============ 欢迎页 ============ */
        .welcome {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 32px;
            text-align: center;
            animation: fadeIn 0.6s ease;
            position: relative;
            overflow: hidden;
        }

        /* 背景装饰 */
        .welcome::before {
            content: '';
            position: absolute;
            top: -120px;
            left: 50%;
            transform: translateX(-50%);
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(212, 69, 95, 0.06) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .welcome::after {
            content: '';
            position: absolute;
            bottom: -80px;
            right: -80px;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(212, 69, 95, 0.05) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .welcome-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--rose-400), var(--rose-600));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 56px;
            margin-bottom: 28px;
            box-shadow: 0 16px 48px rgba(212, 69, 95, 0.35), 0 0 0 8px rgba(212, 69, 95, 0.06);
            animation: breathe 3s ease-in-out infinite;
            position: relative;
            z-index: 1;
        }

        .welcome-avatar::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 2px solid rgba(212, 69, 95, 0.15);
            animation: ring 2s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); box-shadow: 0 16px 48px rgba(212, 69, 95, 0.35), 0 0 0 8px rgba(212, 69, 95, 0.06); }
            50% { transform: scale(1.03); box-shadow: 0 20px 56px rgba(212, 69, 95, 0.4), 0 0 0 12px rgba(212, 69, 95, 0.08); }
        }

        @keyframes ring {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.5; }
        }

        .welcome h2 {
            font-size: 26px;
            font-weight: 600;
            color: var(--ink);
            margin-bottom: 10px;
            letter-spacing: 0.5px;
            position: relative;
            z-index: 1;
        }

        .welcome-tagline {
            font-size: 13px;
            color: var(--rose-400);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 16px;
            font-weight: 500;
            position: relative;
            z-index: 1;
        }

        .welcome p {
            font-size: 15px;
            color: var(--ink-soft);
            line-height: 1.7;
            max-width: 300px;
            position: relative;
            z-index: 1;
        }

        .welcome-tips {
            margin-top: 32px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            max-width: 280px;
        }

        .welcome-tip {
            padding: 12px 16px;
            background: white;
            border-radius: 12px;
            font-size: 13px;
            color: var(--ink-soft);
            text-align: left;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            box-shadow: 0 2px 12px var(--shadow);
        }

        .welcome-tip-icon {
            flex-shrink: 0;
            font-size: 16px;
        }

        /* ============ 聊天区域 ============ */
        .chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .chat::-webkit-scrollbar {
            width: 4px;
        }

        .chat::-webkit-scrollbar-thumb {
            background: var(--rose-200);
            border-radius: 2px;
        }

        .message {
            display: flex;
            gap: 10px;
            max-width: 85%;
            animation: msgIn 0.4s ease;
        }

        @keyframes msgIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .message.assistant .message-avatar {
            background: linear-gradient(135deg, var(--rose-400), var(--rose-500));
            color: white;
        }

        .message.user .message-avatar {
            background: var(--cream-dark);
            color: var(--ink-soft);
            font-size: 11px;
        }

        .message-content {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .message-bubble {
            padding: 14px 18px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.7;
            white-space: pre-wrap;
        }

        .message.assistant .message-bubble {
            background: white;
            color: var(--ink-soft);
            border: 1px solid var(--rose-100);
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 12px var(--shadow);
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, var(--rose-500), var(--rose-400));
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message-time {
            font-size: 11px;
            color: var(--ink-light);
            padding: 0 8px;
        }

        .message.user .message-time {
            text-align: right;
        }

        /* ============ 加载状态 ============ */
        .typing {
            display: flex;
            gap: 10px;
            max-width: 85%;
            animation: msgIn 0.4s ease;
        }

        .typing .message-avatar {
            background: linear-gradient(135deg, var(--rose-400), var(--rose-500));
            color: white;
        }

        .typing-bubble {
            padding: 14px 18px;
            background: white;
            border: 1px solid var(--rose-100);
            border-radius: 20px;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 12px var(--shadow);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background: var(--rose-400);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        /* ============ 底部输入 ============ */
        .input-area {
            padding: 12px 16px calc(12px + env(safe-area-inset-bottom)));
            background: white;
            border-top: 1px solid var(--rose-100);
            flex-shrink: 0;
        }

        .input-wrap {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .input-field {
            flex: 1;
            padding: 12px 18px;
            border: 1.5px solid var(--rose-200);
            border-radius: 24px;
            font-size: 15px;
            font-family: inherit;
            background: var(--rose-100);
            color: var(--ink);
            outline: none;
            transition: all 0.2s;
            min-height: 44px;
            max-height: 120px;
            resize: none;
        }

        .input-field:focus {
            border-color: var(--rose-400);
            background: white;
        }

        .input-field::placeholder {
            color: var(--ink-light);
        }

        .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--rose-500), var(--rose-400));
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
            box-shadow: 0 4px 16px rgba(212, 69, 95, 0.25);
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(212, 69, 95, 0.35);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* ============ 模式提示 ============ */
        .mode-hint {
            text-align: center;
            padding: 8px 16px;
            font-size: 11px;
            color: var(--ink-light);
            background: var(--cream);
            border-top: 1px solid var(--rose-100);
        }

        .mode-hint.demo {
            color: var(--rose-500);
            background: var(--rose-100);
        }

        /* ============ 响应式 ============ */
        @media (max-width: 480px) {
            .header {
                padding: 12px 16px;
            }

            .avatar {
                width: 40px;
                height: 40px;
                font-size: 18px;
            }

            .header-info h1 {
                font-size: 15px;
            }

            .welcome-avatar {
                width: 80px;
                height: 80px;
                font-size: 36px;
            }

            .message {
                max-width: 90%;
            }
        }
    </style>
</head>
<body>
    <!-- 顶部 -->
    <header class="header">
        <div class="header-left">
            <div class="avatar">🌸</div>
            <div class="header-info">
                <h1>小雅</h1>
                <p><span class="status-dot"></span> 在线</p>
            </div>
        </div>
        <div class="header-right">
            <button class="icon-btn export-btn" onclick="exportChat()" title="导出聊天记录">📥 导出</button>
            <button class="icon-btn" onclick="toggleMemory()" title="查看记忆">🧠</button>
            <button class="icon-btn" onclick="clearChat()" title="重新开始">🔄</button>
        </div>
    </header>

    <!-- 记忆面板 -->
    <div class="memory-overlay" id="memoryOverlay" onclick="toggleMemory()"></div>
    <div class="memory-panel" id="memoryPanel">
        <div class="memory-header">
            <h2>🧠 记忆存档</h2>
            <button class="icon-btn" onclick="toggleMemory()">✕</button>
        </div>
        <div class="memory-content" id="memoryContent">
            <div class="memory-empty">
                <div class="memory-empty-icon">🌱</div>
                <p>和我多聊几句<br>我会记住你的故事</p>
            </div>
        </div>
        <div class="memory-footer">
            <button class="reset-btn" onclick="resetMemory()">清除所有记忆，重新开始</button>
        </div>
    </div>

    <!-- 聊天区 -->
    <div class="chat" id="chatArea">
        <div class="welcome" id="welcome">
            <div class="welcome-avatar">🌸</div>
            <p class="welcome-tagline">她进化 · 小雅</p>
            <h2>想说的时候，就说</h2>
            <p>不用想太多格式，不用担心说错。<br>我会记住你说的话，下次来还在。</p>
            <div class="welcome-tips">
                <div class="welcome-tip">
                    <span class="welcome-tip-icon">💭</span>
                    <span>工作、感情、自我成长，或者只是想找人陪</span>
                </div>
                <div class="welcome-tip">
                    <span class="welcome-tip-icon">🌱</span>
                    <span>一起聊聊最近的烦恼、纠结、或者开心的事</span>
                </div>
                <div class="welcome-tip">
                    <span class="welcome-tip-icon">💪</span>
                    <span>我会认真听，然后跟你一起想</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 输入区 -->
    <div class="input-area">
        <div class="input-wrap">
            <textarea class="input-field" id="messageInput" placeholder="想说点什么……" rows="1" onkeydown="handleKeyDown(event)" oninput="autoResize(this)"></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
        </div>
    </div>

    <!-- 模式提示 -->
    <div class="mode-hint demo" id="modeHint">⚠️ 当前为演示模式，请填写 API Key 体验完整功能</div>

    <script>
        const API_BASE = window.location.origin;

        // 持久化 userId到 localStorage，这样换浏览器/缓存后还是同一个人
        function getUserId() {
            let userId = localStorage.getItem('her_evolution_user_id');
            if (!userId) {
                userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('her_evolution_user_id', userId);
            }
            return userId;
        }
        
        const USER_ID = getUserId();

        let isLoading = false;
        let hasStarted = false;

        // 页面加载时获取历史
        window.onload = async () => {
            try {
                const res = await fetch(`${API_BASE}/api/history/${USER_ID}`);
                const data = await res.json();
                if (data.messages && data.messages.length > 0) {
                    hasStarted = true;
                    document.getElementById('welcome').style.display = 'none';
                    data.messages.forEach(msg => {
                        if (msg.role !== 'system') {
                            addMessage(msg.content, msg.role);
                        }
                    });
                    scrollToBottom();
                }
                // 获取记忆
                loadMemory();
            } catch (e) {
                console.log('首次使用');
            }
        };

        // 发送消息
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();

            if (!message || isLoading) return;

            input.value = '';
            input.style.height = 'auto';

            if (!hasStarted) {
                hasStarted = true;
                document.getElementById('welcome').style.display = 'none';
            }

            // 添加用户消息
            addMessage(message, 'user');

            // 显示加载
            showTyping();

            try {
                const res = await fetch(`${API_BASE}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: USER_ID, message })
                });

                const data = await res.json();
                hideTyping();

                if (data.reply) {
                    addMessage(data.reply, 'assistant');
                    loadMemory(); // 更新记忆
                } else {
                    addMessage('抱歉，出了点问题。请刷新重试。', 'assistant');
                }
            } catch (e) {
                hideTyping();
                addMessage('网络似乎有点问题，可以刷新重试一下 🌸', 'assistant');
            }

            scrollToBottom();
        }

        // 添加消息到界面
        function addMessage(content, role) {
            const chat = document.getElementById('chatArea');
            const welcome = document.getElementById('welcome');

            if (welcome && role === 'user') {
                welcome.style.display = 'none';
            }

            const msg = document.createElement('div');
            msg.className = `message ${role}`;

            const avatarContent = role === 'assistant' ? '🌸' : '我';
            const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });

            msg.innerHTML = `
                <div class="message-avatar">${avatarContent}</div>
                <div class="message-content">
                    <div class="message-bubble">${escapeHtml(content)}</div>
                    <div class="message-time">${time}</div>
                </div>
            `;

            chat.appendChild(msg);
            scrollToBottom();
        }

        // 显示/隐藏加载
        function showTyping() {
            isLoading = true;
            document.getElementById('sendBtn').disabled = true;

            const chat = document.getElementById('chatArea');
            const typing = document.createElement('div');
            typing.id = 'typing';
            typing.className = 'typing';
            typing.innerHTML = `
                <div class="message-avatar">🌸</div>
                <div class="typing-bubble">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            `;
            chat.appendChild(typing);
            scrollToBottom();
        }

        function hideTyping() {
            isLoading = false;
            document.getElementById('sendBtn').disabled = false;
            const typing = document.getElementById('typing');
            if (typing) typing.remove();
        }

        // 加载记忆
        async function loadMemory() {
            try {
                const res = await fetch(`${API_BASE}/api/memory/${USER_ID}`);
                const data = await res.json();

                const content = document.getElementById('memoryContent');

                if (!data.memory) {
                    content.innerHTML = `
                        <div class="memory-empty">
                            <div class="memory-empty-icon">🌱</div>
                            <p>和我多聊几句<br>我会记住你的故事</p>
                        </div>
                    `;
                } else {
                    content.innerHTML = `
                        <div class="memory-section">
                            <div class="memory-section-title">我对你的印象</div>
                            <div class="memory-text">${escapeHtml(data.memory)}</div>
                        </div>
                        <div class="memory-section">
                            <div class="memory-section-title">对话记录</div>
                            <div class="memory-text">共 ${data.messageCount} 条对话</div>
                        </div>
                    `;
                }
            } catch (e) {
                console.log('无法加载记忆');
            }
        }

        // 切换记忆面板
        function toggleMemory() {
            const panel = document.getElementById('memoryPanel');
            const overlay = document.getElementById('memoryOverlay');
            panel.classList.toggle('open');
            overlay.classList.toggle('open');
            if (panel.classList.contains('open')) {
                loadMemory();
            }
        }

        // 清除记忆
        async function resetMemory() {
            if (!confirm('确定要清除所有记忆吗？这会让我们重新开始。')) return;

            try {
                await fetch(`${API_BASE}/api/reset/${USER_ID}`, { method: 'POST' });
                location.reload();
            } catch (e) {
                alert('清除失败，请刷新重试');
            }
        }

        // 清除对话（保留记忆）
        function clearChat() {
            if (!confirm('确定要开始新对话吗？我会保留对你的记忆。')) return;
            hasStarted = false;
            document.getElementById('chatArea').innerHTML = `
                <div class="welcome" id="welcome">
                    <div class="welcome-avatar">🌸</div>
                    <p class="welcome-tagline">她进化 · 小雅</p>
                    <h2>想说的时候，就说</h2>
                    <p>不用想太多格式，不用担心说错。<br>我会记住你说的话，下次来还在。</p>
                    <div class="welcome-tips">
                        <div class="welcome-tip">
                            <span class="welcome-tip-icon">💭</span>
                            <span>工作、感情、自我成长，或者只是想找人陪</span>
                        </div>
                        <div class="welcome-tip">
                            <span class="welcome-tip-icon">🌱</span>
                            <span>一起聊聊最近的烦恼、纠结、或者开心的事</span>
                        </div>
                        <div class="welcome-tip">
                            <span class="welcome-tip-icon">💪</span>
                            <span>我会认真听，然后跟你一起想</span>
                        </div>
                    </div>
                </div>
            `;
        }

        // 导出聊天记录
        function exportChat() {
            const userId = localStorage.getItem('her_evolution_user_id') || 'default';
            window.open(`${API_BASE}/api/export/${userId}`, '_blank');
        }

        // 工具函数
        function scrollToBottom() {
            setTimeout(() => {
                const chat = document.getElementById('chatArea');
                chat.scrollTop = chat.scrollHeight;
            }, 50);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML.replace(/\n/g, '<br>');
        }

        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 120) + 'px';
        }
    </script>
</body>
</html>
